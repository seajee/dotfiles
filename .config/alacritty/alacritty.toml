[window]
startup_mode = "Maximized"
opacity = 1

[font]
normal.family = "Iosevka"
bold.family = "Iosevka"
italic.family = "Iosevka"
bold_italic.family = "Iosevka"
size = 17.0

[mouse]
hide_when_typing = true

[colors.primary]
background = "#181818"
foreground = "#d6d6d6"

dim_foreground    = "#dbdbdb"
bright_foreground = "#d9d9d9"

[colors.cursor]
text   = "#2c2c2c"
cursor = "#d9d9d9"

[colors.normal]
black   = "#1c1c1c"
red     = "#bc5653"
green   = "#909d63"
yellow  = "#ebc17a"
blue    = "#7eaac7"
magenta = "#aa6292"
cyan    = "#86d3ce"
white   = "#cacaca"

[colors.bright]
black   = "#636363"
red     = "#bc5653"
green   = "#909d63"
yellow  = "#ebc17a"
blue    = "#7eaac7"
magenta = "#aa6292"
cyan    = "#86d3ce"
white   = "#f7f7f7"

[colors.dim]
black   = "#232323"
red     = "#74423f"
green   = "#5e6547"
yellow  = "#8b7653"
blue    = "#556b79"
magenta = "#6e4962"
cyan    = "#5c8482"
white   = "#828282"
